<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<title>Calendari Laboral</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F4F6F9; --card:#FFF; --primary:#1976D2; --primary-light:#E3F2FD;
    --text:#1A1A2E; --text-muted:#6B7280; --border:#E5E7EB;
    --shadow:0 2px 12px rgba(0,0,0,0.08); --radius:16px; --radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent; touch-action: manipulation;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;padding-bottom:40px; overflow-x: hidden;}
  h1{font-size:22px;font-weight:700;color:var(--primary);text-align:center;margin-bottom:16px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px; touch-action: pan-y;}
  .card-title{font-size:14px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px}

  /* NAV */
  .nav-mes{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .nav-mes h2{font-size:18px;font-weight:700}
  .nav-btn{background:none;border:none;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--primary);cursor:pointer}
  .btn-avui{font-size:13px;font-weight:600;color:var(--primary);background:var(--primary-light);border:none;border-radius:20px;padding:6px 14px;cursor:pointer}

  /* CALENDARI */
  .cal-caps{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
  .cal-cap{text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);padding:4px 0}
  .cal-cap.ds{color:#F9A825} .cal-cap.dg{color:#E53935}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .dia-btn{aspect-ratio:1;border-radius:var(--radius-sm);border:none;background:#F5F5F5;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px;padding:0}
  .dia-btn.buit{pointer-events:none;background:transparent}
  .dia-num{font-size:13px;font-weight:700}
  .dia-punt{width:5px;height:5px;border-radius:50%;background:#E53935}
  .dia-punt.inv{background:transparent}

  /* CONTROLS */
  .controls-grid{display:grid;grid-template-columns:1fr 1px 1fr;align-items:start}
  .controls-sep{background:var(--border);min-height:80px;margin:0 10px}
  .ctrl-group{display:flex;flex-direction:column;align-items:center;gap:8px}
  .switch-row{display:flex;align-items:center;gap:6px}
  .sw-label{font-size:12px;font-weight:600}
  .toggle{position:relative;width:38px;height:22px;cursor:pointer}
  .toggle input{display:none}
  .toggle-track{position:absolute;inset:0;background:#CBD5E1;border-radius:11px;transition:background .2s}
  .toggle input:checked~.toggle-track{background:var(--primary)}
  .toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s}
  .toggle input:checked~.toggle-thumb{left:19px}
  .cycle-btn{border:2px solid #BDBDBD;border-radius:10px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;min-width:88px;text-align:center}
  .cycle-btn:disabled{opacity:.35;cursor:default;background:#eee!important}

  /* VALOR */
  .valor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .valor-controls{display:flex;align-items:center;justify-content:center;gap:20px}
  .valor-num{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;min-width:56px;text-align:center;color:var(--primary)}
  .valor-btn{width:46px;height:46px;border-radius:50%;border:2px solid var(--primary);background:#fff;color:var(--primary);font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .valor-btn:disabled{opacity:.3;border-color:#CBD5E1;color:#CBD5E1}

  #missatge{font-size:12px;color:#4CAF50;font-style:italic;text-align:center;min-height:18px;margin-top:8px}
  hr.dv{border:none;border-top:1px solid var(--border);margin:12px 0}

  /* REGISTRE I COMPTADORS */
  .reg-item{border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:6px;border:1px solid #BDBDBD;font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
  .comp-item{background:#F8FAFC;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px}
  .comp-f1{display:flex;align-items:center;gap:8px}
  .comp-color{width:14px;height:14px;border-radius:4px;border:1px solid #BDBDBD}
  .comp-nom{font-size:12px;font-weight:700;min-width:58px}
  .comp-total{font-size:14px;font-weight:700;color:var(--primary);min-width:44px;font-family:'DM Mono',monospace}
  .comp-data{font-size:10px;color:var(--text-muted);flex:1}
  .comp-reset{background:none;border:none;color:var(--primary);font-size:18px;cursor:pointer}
  .ini-input{width:60px;height:32px;border:1px solid var(--border);border-radius:8px;text-align:center;font-size:13px}

  .accio-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn-accio{border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer}
  .btn-esborrar{background:#EF9A9A;color:#B71C1C}
  .btn-reset{background:#FFCDD2;color:#B71C1C}
  .btn-backup{background:#C8E6C9;color:#2E7D32}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal-box{background:#fff;border-radius:var(--radius);padding:24px;width:100%;max-width:320px}
</style>
</head>
<body>

<h1 id="txt-titol">Calendari Laboral</h1>

<div class="card" id="card-calendari">
  <div class="nav-mes">
    <button class="nav-btn" onclick="canviarMes(-1)">‹</button>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-avui" id="txt-avui" onclick="anarAvui()">Avui</button>
      <h2 id="titol-mes"></h2>
    </div>
    <button class="nav-btn" onclick="canviarMes(1)">›</button>
  </div>
  <div class="cal-caps" id="cal-caps"></div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="card">
  <div class="card-title" id="txt-entrada">Entrada de dades</div>
  <div class="controls-grid">
    <div class="ctrl-group">
      <div class="switch-row">
        <label class="toggle">
          <input type="checkbox" id="chk-fons" onchange="actualitzarControls()">
          <div class="toggle-track"></div><div class="toggle-thumb"></div>
        </label>
        <span class="sw-label" id="txt-modificar">Modificar</span>
      </div>
      <button class="cycle-btn" id="btn-fons" onclick="ciclarColor('fons')"></button>
    </div>
    <div class="controls-sep"></div>
    <div class="ctrl-group">
      <div class="switch-row">
        <label class="toggle">
          <input type="checkbox" id="chk-text" onchange="actualitzarControls()">
          <div class="toggle-track"></div><div class="toggle-thumb"></div>
        </label>
        <span class="sw-label" id="txt-claboral">C. laboral</span>
      </div>
      <button class="cycle-btn" id="btn-text" onclick="ciclarColor('text')"></button>
    </div>
  </div>
  <hr class="dv">
  <div class="valor-header">
    <span class="valor-title" id="txt-variar">VARIAR HORES</span>
    <div class="switch-row">
      <label class="toggle">
        <input type="checkbox" id="chk-valor" onchange="actualitzarControls()">
        <div class="toggle-track"></div><div class="toggle-thumb"></div>
      </label>
      <span class="sw-label" id="txt-habilitar" style="font-size:11px;color:var(--text-muted)">Habilitar</span>
    </div>
  </div>
  <div class="valor-controls">
    <button class="valor-btn" id="btn-menys" onclick="canviarValor(-1)" disabled>−</button>
    <span class="valor-num" id="valor-display">+8</span>
    <button class="valor-btn" id="btn-mes"   onclick="canviarValor(1)"  disabled>+</button>
  </div>
  <div id="missatge"></div>
</div>

<div class="card">
  <div class="card-title" id="txt-registre">Registre del mes</div>
  <div id="registre-llista"></div>
  <hr class="dv">
  <div class="card-title" id="txt-comptadors" style="margin-top:4px">Comptadors per color</div>
  <div id="comptadors-llista"></div>
  <hr class="dv">
  <div class="card-title" id="txt-copia">Còpia de seguretat</div>
  <div class="accio-row" style="margin-bottom:15px">
    <button class="btn-accio btn-backup" id="txt-exportar" onclick="exportarDades()">📤 Exportar JSON</button>
    <button class="btn-accio btn-backup" id="txt-importar" onclick="document.getElementById('input-import').click()">📥 Importar JSON</button>
    <input type="file" id="input-import" style="display:none" accept=".json" onchange="importarDades(event)">
  </div>
  <div class="accio-row">
    <button class="btn-accio btn-esborrar" id="txt-esborrarMes" onclick="confirmarEsborrarMes()">🗑 Esborra el mes</button>
    <button class="btn-accio btn-reset" id="txt-reset" onclick="confirmarReset()">💥 Reset total</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title" style="font-weight:700;margin-bottom:10px"></div>
    <div class="modal-body" id="modal-body" style="font-size:13px;color:var(--text-muted);margin-bottom:20px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button id="modal-no" style="padding:8px 18px;border:1px solid var(--border);background:none;border-radius:8px;cursor:pointer">No</button>
      <button id="modal-si" style="padding:8px 18px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer">Sí</button>
    </div>
  </div>
</div>

<script>
// --- TRADUCCIONS ---
const I18N = {
  ca: {
    titol: "📅 Calendari Laboral", entrada: "Entrada de dades", modificar: "Modificar", claboral: "Festius locals", variar: "Modificar Hores", habilitar: "Habilitar", registre: "Registre del mes", comptadors: "Hores acumulades", copia: "Còpia de seguretat", exportar: "📤 Exportar JSON", importar: "📥 Importar JSON", esborrarMes: "🗑 Esborra el mes", reset: "💥 Reset total", avui: "Avui",
    mesos: ['', 'Gener', 'Febrer', 'Març', 'Abril', 'Maig', 'Juny', 'Juliol', 'Agost', 'Setembre', 'Octubre', 'Novembre', 'Desembre'],
    dies: ['Dl', 'Dt', 'Dc', 'Dj', 'Dv', 'Ds', 'Dg'],
    msgDesat: "✓ Desat", msgExport: "✓ Còpia exportada", msgImport: "✓ Dades importades", msgEsborrat: "✓ Mes esborrat", confirmImport: "Això sobreescriurà tot el calendari. Continuar?", confirmReset: "Vols esborrar tota la memòria?", horesIni: "Hores inicials:"
  },
  es: {
    titol: "📅 Calendario Laboral", entrada: "Entrada de datos", modificar: "Modificar", claboral: "Festivos locales", variar: "modificar Horas", habilitar: "Habilitar", registre: "Registro del mes", comptadors: "Horas acumuladas", copia: "Copia de seguridad", exportar: "📤 Exportar JSON", importar: "📥 Importar JSON", esborrarMes: "🗑 Borrar mes", reset: "💥 Reset total", avui: "Hoy",
    mesos: ['', 'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'],
    dies: ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sá', 'Do'],
    msgDesat: "✓ Guardado", msgExport: "✓ Copia exportada", msgImport: "✓ Datos importados", msgEsborrat: "✓ Mes borrado", confirmImport: "¿Esto sobrescribirá todo el calendario. Continuar?", confirmReset: "¿Quieres borrar toda la memoria?", horesIni: "Horas iniciales:"
  },
  en: {
    titol: "📅 Work Calendar", entrada: "Data Input", modificar: "Modify", claboral: "Local holidays", variar: "Modify Hours", habilitar: "Enable", registre: "Month Records", comptadors: "Accumulated hours", copia: "Backup", exportar: "📤 Export JSON", importar: "📥 Import JSON", esborrarMes: "🗑 Clear Month", reset: "💥 Hard Reset", avui: "Today",
    mesos: ['', 'January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
    dies: ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'],
    msgDesat: "✓ Saved", msgExport: "✓ Backup exported", msgImport: "✓ Data imported", msgEsborrat: "✓ Month cleared", confirmImport: "This will overwrite all data. Continue?", confirmReset: "Delete all memory?", horesIni: "Initial hours:"
  }
};

let lang = navigator.language.split('-')[0];
if (!I18N[lang]) lang = 'en';
const T = I18N[lang];

function aplicarTraduccions() {
  document.getElementById('txt-titol').textContent = T.titol;
  document.getElementById('txt-entrada').textContent = T.entrada;
  document.getElementById('txt-modificar').textContent = T.modificar;
  document.getElementById('txt-claboral').textContent = T.claboral;
  document.getElementById('txt-variar').textContent = T.variar;
  document.getElementById('txt-habilitar').textContent = T.habilitar;
  document.getElementById('txt-registre').textContent = T.registre;
  document.getElementById('txt-comptadors').textContent = T.comptadors;
  document.getElementById('txt-copia').textContent = T.copia;
  document.getElementById('txt-exportar').textContent = T.exportar;
  document.getElementById('txt-importar').textContent = T.importar;
  document.getElementById('txt-esborrarMes').textContent = T.esborrarMes;
  document.getElementById('txt-reset').textContent = T.reset;
  document.getElementById('txt-avui').textContent = T.avui;
}

// --- LÒGICA CALENDARI ---
const COLORS_FONS = [
  { nom:'C.C.', hex:'#90CAF9', tc:'#212121' },
  { nom: lang==='ca'?'Laborable':(lang==='es'?'Laborable':'Workday'), hex:'#F5F5F5', tc:'#212121' },
  { nom:'Ll. Disp.', hex:'#35A54D', tc:'#FFFFFF' },
  { nom:'Flexi', hex:'#FFF59D', tc:'#212121' },
  { nom:'Vacances', hex:'#781862', tc:'#FFF59D' },
];
const COLORS_TEXT = [{ nom:'Laborable', hex:'#000000' }, { nom:'Festiu', hex:'#1A56AF' }];

const HEX_CC = '#90CAF9', HEX_FESTIU = '#1A56AF', COLOR_DEF = '#F5F5F5', COLOR_DS = '#F9A825', COLOR_DG = '#E53935', COLOR_T_DEF = '#212121';

let memoria = JSON.parse(localStorage.getItem('calendari_personal') || '{}');
let comptadors = JSON.parse(localStorage.getItem('comptadors_colors') || '{}');
const _avui = new Date();
let navMes = _avui.getMonth() + 1, navAny = _avui.getFullYear();
let idxFons = 0, idxText = 0, valorDia = 8;

function desarTot() {
  localStorage.setItem('calendari_personal', JSON.stringify(memoria));
  localStorage.setItem('comptadors_colors', JSON.stringify(comptadors));
}

function actualitzarControls() {
  const f = document.getElementById('chk-fons').checked;
  const t = document.getElementById('chk-text').checked;
  const v = document.getElementById('chk-valor').checked;
  document.getElementById('btn-fons').disabled = !f;
  document.getElementById('btn-text').disabled = !t;
  document.getElementById('btn-menys').disabled = !v;
  document.getElementById('btn-mes').disabled = !v;
}

function ciclarColor(t) {
  if(t==='fons'){ idxFons=(idxFons+1)%COLORS_FONS.length; pintarBadgeFons(); }
  else { idxText=(idxText+1)%COLORS_TEXT.length; pintarBadgeText(); }
}
function pintarBadgeFons(){ const c=COLORS_FONS[idxFons]; const b=document.getElementById('btn-fons'); b.textContent=c.nom; b.style.background=c.hex; b.style.color=c.tc; }
function pintarBadgeText(){ const c=COLORS_TEXT[idxText]; const b=document.getElementById('btn-text'); b.textContent=c.nom; b.style.color=c.hex; }

function canviarValor(d){ valorDia=Math.max(-8,Math.min(8,valorDia+d)); if(valorDia===0)valorDia=d>0?1:-1; pintarDisplayValor(); }
function pintarDisplayValor(){ const el=document.getElementById('valor-display'); el.textContent=(valorDia>=0?'+':'')+valorDia; el.style.color=valorDia>=0?'#1976D2':'#E53935'; }

function seleccionarDia(clau) {
  const [a,m,d] = clau.split('-').map(Number);
  const infoEx = memoria[clau]||{};
  const chkF = document.getElementById('chk-fons').checked;
  const chkT = document.getElementById('chk-text').checked;
  const chkV = document.getElementById('chk-valor').checked;

  if (chkF && COLORS_FONS[idxFons].hex === COLOR_DEF) { delete memoria[clau]; }
  else {
    const nF = chkF ? COLORS_FONS[idxFons].hex : (infoEx.fons||COLOR_DEF);
    const nT = chkT ? (COLORS_TEXT[idxText].nom==='Festiu'?HEX_FESTIU:null) : (infoEx.text||null);
    const nV = chkV ? valorDia : (infoEx.valor||8);
    memoria[clau] = { fons:nF, valor:nV, text:nT };
  }
  desarTot(); mostrarMissatge(T.msgDesat); renderTot();
}

function renderCalendari() {
  document.getElementById('titol-mes').textContent = `${T.mesos[navMes]} ${navAny}`;
  const caps = document.getElementById('cal-caps'); caps.innerHTML='';
  T.dies.forEach((d,i)=>{ caps.innerHTML+=`<div class="cal-cap ${i===5?'ds':i===6?'dg':''}">${d}</div>`; });
  
  const grid = document.getElementById('cal-grid'); grid.innerHTML='';
  const primer = new Date(navAny, navMes-1, 1).getDay();
  const buits = primer === 0 ? 6 : primer - 1;
  for(let i=0;i<buits;i++) grid.innerHTML+='<div class="dia-btn buit"></div>';
  
  const total = new Date(navAny, navMes, 0).getDate();
  for(let d=1; d<=total; d++) {
    const clau = `${navAny}-${navMes}-${d}`;
    const info = memoria[clau]||{};
    const dw = (new Date(navAny, navMes-1, d).getDay()+6)%7;
    const cF = info.fons || COLOR_DEF;
    const cT = info.text || (dw===5?COLOR_DS:dw===6?COLOR_DG:COLOR_T_DEF);
    const punt = info.valor && info.valor!==8 && info.valor!==-8;
    grid.innerHTML += `<button class="dia-btn" style="background:${cF}" onclick="seleccionarDia('${clau}')">
      <span class="dia-num" style="color:${cT}">${d}</span>
      <span class="dia-punt ${punt?'':'inv'}"></span>
    </button>`;
  }
}

function renderRegistre() {
  const el = document.getElementById('registre-llista'); el.innerHTML='';
  let trobat = false;
  for(let d=1; d<=31; d++){
    const clau = `${navAny}-${navMes}-${d}`;
    if(memoria[clau] && (memoria[clau].valor!==8 && memoria[clau].valor!==-8)){
      el.innerHTML += `<div class="reg-item" style="background:${memoria[clau].fons}">Dia ${d}: ${memoria[clau].valor}h</div>`;
      trobat = true;
    }
  }
  if(!trobat) el.innerHTML = `<div style="text-align:center;font-size:12px;color:var(--text-muted)">-</div>`;
}

function canviarMes(d){ navMes+=d; if(navMes>12){navMes=1;navAny++;} if(navMes<1){navMes=12;navAny--;} renderTot(); }
function anarAvui(){ navMes=_avui.getMonth()+1; navAny=_avui.getFullYear(); renderTot(); }

function mostrarMissatge(txt){
  const el=document.getElementById('missatge'); el.textContent=txt;
  setTimeout(()=>el.textContent='', 2000);
}

// --- SWIPE GESTURES ---
window.addEventListener('load', () => {
  let touchstartX = 0, touchendX = 0;
  const area = document.getElementById('card-calendari');
  area.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive:true});
  area.addEventListener('touchend', e => {
    touchendX = e.changedTouches[0].screenX;
    if (touchendX < touchstartX - 60) canviarMes(1);
    if (touchendX > touchstartX + 60) canviarMes(-1);
  }, {passive:true});
});

// --- BACKUP ---
function exportarDades(){
  const blob = new Blob([JSON.stringify({memoria,comptadors})], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`backup_${navAny}.json`; a.click();
  mostrarMissatge(T.msgExport);
}
function importarDades(e){
  const file = e.target.files[0]; if(!file)return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const data = JSON.parse(ev.target.result);
    memoria=data.memoria; comptadors=data.comptadors; desarTot(); renderTot(); mostrarMissatge(T.msgImport);
  };
  reader.readAsText(file);
}

function renderTot(){ renderCalendari(); renderRegistre(); }

// Init
aplicarTraduccions();
pintarBadgeFons();
pintarBadgeText();
pintarDisplayValor();
actualitzarControls();
renderTot();

// Bloqueig Zoom Doble Tap
let lastTouch = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if(now - lastTouch <= 300) e.preventDefault();
  lastTouch = now;
}, false);
</script>
</body>
</html>
